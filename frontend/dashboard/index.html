<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Scanner Pro</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="container">
    <h1>Stock Scanner Pro</h1>
    <p>Escáner profesional tipo TradingView con actualización cada 45s.</p>

    <section class="panel provider-panel">
      <h2>API Keys de proveedores</h2>
      <p class="muted">Configura las llaves API para proveedores de datos. Se guardan en el backend y puedes actualizarlas cuando quieras.</p>
      <div id="providerSettings" class="provider-grid"></div>
    </section>

    <div class="toolbar">
      <button id="scanBtn">Ejecutar escaneo</button>
      <label>Score mínimo <input id="minScore" type="number" min="0" max="10" value="6" /></label>
      <label>Exchange
        <select id="exchangeFilter">
          <option value="ALL">Todos</option>
          <option value="NASDAQ">NASDAQ</option>
          <option value="NYSE">NYSE</option>
          <option value="SP500">S&P500</option>
        </select>
      </label>
      <span id="status">Listo.</span>
    </div>
    <table id="resultsTable">
      <thead>
        <tr>
          <th data-col="symbol">Ticker</th>
          <th data-col="exchange">Exchange</th>
          <th data-col="last_price">Precio</th>
          <th data-col="score">Score</th>
          <th data-col="rsi">RSI</th>
          <th data-col="rel_volume">Vol Rel</th>
          <th data-col="macd">MACD</th>
          <th data-col="signal">Señales</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <script>
    const state = { results: [], sortBy: 'score', sortDir: 'desc', providerConfigs: [] };

    const statusEl = document.getElementById('status');
    const tableBody = document.querySelector('#resultsTable tbody');
    const providerSettingsEl = document.getElementById('providerSettings');

    async function fetchResults(path = '/api/results') {
      const res = await fetch(path, { method: path.includes('scan') ? 'POST' : 'GET' });
      const data = await res.json();
      state.results = data.results || [];
      render();
      statusEl.textContent = `${data.total} símbolos procesados (${new Date().toLocaleTimeString()})`;
    }

    async function fetchProviderConfigs() {
      const res = await fetch('/api/provider-configs');
      const data = await res.json();
      state.providerConfigs = data.providers || [];
      renderProviders();
    }

    async function saveProviderConfig(provider, apiKey, statusEl) {
      statusEl.textContent = 'Guardando...';
      const res = await fetch(`/api/provider-configs/${provider}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: apiKey })
      });

      if (!res.ok) {
        statusEl.textContent = 'Error al guardar';
        return;
      }

      statusEl.textContent = 'Guardado correctamente';
      await fetchProviderConfigs();
    }

    function renderProviders() {
      providerSettingsEl.innerHTML = state.providerConfigs.map((config) => {
        const lastUpdate = config.updated_at ? new Date(config.updated_at).toLocaleString() : 'Nunca';
        const statusClass = config.configured ? 'provider-status ok' : 'provider-status pending';
        const statusText = config.configured ? 'Configurado' : 'Sin configurar';

        return `
          <form class="provider-card" data-provider="${config.provider}">
            <h3>${config.provider.toUpperCase()}</h3>
            <p class="${statusClass}">${statusText}</p>
            <label>API key
              <input type="password" name="api_key" placeholder="Pega tu API key aquí" autocomplete="off" />
            </label>
            <small class="muted">Última actualización: ${lastUpdate}</small>
            <button type="submit">Guardar</button>
            <small class="form-status muted"></small>
          </form>
        `;
      }).join('');

      document.querySelectorAll('.provider-card').forEach((form) => {
        form.addEventListener('submit', async (event) => {
          event.preventDefault();
          const provider = form.dataset.provider;
          const apiKey = form.querySelector('input[name="api_key"]').value;
          const formStatusEl = form.querySelector('.form-status');
          await saveProviderConfig(provider, apiKey, formStatusEl);
          form.querySelector('input[name="api_key"]').value = '';
        });
      });
    }

    function render() {
      const minScore = Number(document.getElementById('minScore').value || 0);
      const exchange = document.getElementById('exchangeFilter').value;

      const rows = state.results
        .filter(r => r.score >= minScore)
        .filter(r => exchange === 'ALL' || r.exchange === exchange)
        .sort((a, b) => {
          const dir = state.sortDir === 'asc' ? 1 : -1;
          if (a[state.sortBy] > b[state.sortBy]) return dir;
          if (a[state.sortBy] < b[state.sortBy]) return -dir;
          return 0;
        });

      tableBody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.symbol}</td>
          <td>${r.exchange}</td>
          <td>${r.last_price.toFixed(2)}</td>
          <td><span class="pill">${r.score.toFixed(1)}</span></td>
          <td>${r.rsi.toFixed(2)}</td>
          <td>${r.rel_volume.toFixed(2)}</td>
          <td>${r.macd.toFixed(2)}</td>
          <td>${r.signal || '-'}</td>
        </tr>
      `).join('');
    }

    document.getElementById('scanBtn').addEventListener('click', async () => {
      statusEl.textContent = 'Escaneando mercado...';
      await fetchResults('/api/scan');
    });

    document.getElementById('minScore').addEventListener('input', render);
    document.getElementById('exchangeFilter').addEventListener('change', render);

    document.querySelectorAll('th[data-col]').forEach((th) => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (state.sortBy === col) {
          state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortBy = col;
          state.sortDir = 'desc';
        }
        render();
      });
    });

    fetchProviderConfigs();
    fetchResults();
    setInterval(() => fetchResults('/api/results'), 45000);
  </script>
</body>
</html>
